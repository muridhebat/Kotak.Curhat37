<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Kotak Curhat 37</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9805/9805578.png" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* PERBAIKAN 1: Ubah background agar sama dengan aplikasi (#f1f5f9) agar tidak kelihatan batasnya */
    html, body { 
      width: 100%; 
      height: 100%; 
      background: #f1f5f9; /* Diubah dari biru tua menjadi abu-abu terang */
      font-family: 'Segoe UI', sans-serif; 
      overflow: hidden; 
    }
    
    .container { 
      width: 100%; 
      height: 100vh; /* Gunakan 100vh untuk tinggi viewport */
      /* PERBAIKAN 2: Gunakan properti dinamic height untuk HP agar tidak ada sisa */
      height: -webkit-fill-available; 
      display: flex; 
      flex-direction: column; 
    }
    
    .iframe-container { 
      flex: 1; 
      width: 100%; 
      height: 100%; 
      position: relative; 
      overflow: hidden; /* Cegah scroll di container luar */
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #f1f5f9; /* Samakan dengan body */
    }
    
    /* HAPUS kode .loading dan .spinner yang lama, lalu ganti dengan ini: */
    
    .loading { 
      position: fixed; 
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%); /* Gradasi hangat tema curhat */
      z-index: 9999;
      flex-direction: column;
    }
    
    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    
    .chat-bubble-loader {
      width: 90px;
      height: 90px;
      background: white;
      border-radius: 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 15px 35px rgba(245, 158, 11, 0.15);
      animation: floatBubble 3s ease-in-out infinite;
      position: relative;
    }
    
    /* Efek cahaya (glow) di belakang bubble */
    .chat-bubble-loader::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 32px;
      background: linear-gradient(135deg, #F59E0B, #EA580C);
      z-index: -1;
      opacity: 0.4;
      animation: pulseRing 2s ease-in-out infinite;
      filter: blur(4px);
    }
    
    /* Ekor bubble chat di bawah kiri */
    .chat-bubble-loader::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 22px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 14px solid white;
      filter: drop-shadow(0 4px 3px rgba(245, 158, 11, 0.1));
    }
    
    .heart-icon {
      width: 42px;
      height: 42px;
      animation: heartbeat 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(245, 158, 11, 0.5));
    }
    
    .typing-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    
    .typing-dots span {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, #F59E0B, #EA580C);
      border-radius: 50%;
      animation: bounceDot 1.4s infinite ease-in-out both;
    }
    
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    
    .loading-text {
      color: #92400E;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      animation: fadeInText 2s ease-in-out infinite;
      text-align: center;
    }
    
    @keyframes floatBubble {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    
    @keyframes heartbeat {
      0% { transform: scale(1); }
      15% { transform: scale(1.25); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      60% { transform: scale(1); }
    }
    
    @keyframes bounceDot {
      0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }
    
    @keyframes fadeInText {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    
    @keyframes pulseRing {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }    

    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="loading" id="loading">
      <div class="loader-wrapper">
        <!-- Bubble Chat berisi Hati -->
        <div class="chat-bubble-loader">
          <svg class="heart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#heartGrad)"/>
            <defs>
              <linearGradient id="heartGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
                <stop stop-color="#F59E0B"/>
                <stop offset="1" stop-color="#EA580C"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        
        <!-- Titik-titik typing seperti di WhatsApp -->
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        
        <p class="loading-text">Memuat Kotak Curhat 37...</p>
      </div>
    </div>
    <div class="iframe-container">
        <iframe id="appFrame" src="" allow="fullscreen; camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-popups-to-escape-sandbox allow-downloads"></iframe>
    </div>
  </div>

  <script>
    // URL Google Apps Script Anda
    const APP_URL = "https://script.google.com/macros/s/AKfycbzzUkwSuxCGZZBMnawI6-t1cHZyvNFqhoox0uizs72Z59YOH3kTvjO78ohtJojxQNY6Vw/exec";
    
    const appFrame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    
    function loadApp() {
      loading.style.display = 'flex';
      
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      let targetUrl = APP_URL;
      
      if (id) {
        if (targetUrl.indexOf('?') !== -1) {
             targetUrl += "&id=" + id;
        } else {
             targetUrl += "?id=" + id;
        }
      }
      
      appFrame.src = targetUrl;
    }
    
    appFrame.addEventListener('load', function() {
      loading.style.display = 'none';
    });
    
    window.addEventListener('DOMContentLoaded', loadApp);
  </script>
 
</body>
</html>
